<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Agent Software Team — Live</title>
<style>
  :root{
    --card:#1c2030; --line:#2a2f40; --panel:#191c26;
    --text:#eef1f7; --muted:#9aa3b8; --dim:#6b7488;
    --work:#4f9dff; --done:#34d399; --fix:#fbbf24; --idle:#4b5266;
    --r:14px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:radial-gradient(1200px 600px at 70% -10%, #1b2030 0%, #0f1117 60%); color:var(--text); padding:28px; min-height:100vh;}
  .wrap{max-width:1080px; margin:0 auto;}
  .top{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:22px;}
  .title{font-size:26px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:12px;}
  .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#4f9dff,#7c5cff);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .sub{color:var(--muted); font-size:13px; margin-top:4px;}
  .conn{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); background:var(--card); padding:7px 12px; border-radius:9px; border:1px solid var(--line);}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:var(--idle);}
  .conn.live .dot{background:var(--done); animation:pulse 1.4s infinite;}
  .conn.stale .dot{background:var(--fix);}
  .conn.down .dot{background:var(--fix);}

  .metrics{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px;}
  .metric{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px;}
  .metric .k{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .metric .v{font-size:28px; font-weight:700; margin-top:6px;}
  .dotk{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px;}
  .desk{position:relative; background:linear-gradient(180deg,#1c2030,#171a26); border:1px solid var(--line); border-radius:18px; padding:18px; overflow:hidden; transition:border-color .35s, box-shadow .35s;}
  .desk.active{border-color:var(--work); box-shadow:0 0 0 1px var(--work), 0 12px 30px -12px rgba(79,157,255,.5);}
  .desk.fixs{border-color:var(--fix); box-shadow:0 0 0 1px var(--fix), 0 12px 30px -12px rgba(251,191,36,.4);}
  .desk.donestate{border-color:var(--done);}
  .desk .avatar{width:96px;height:96px;margin:0 auto 10px; display:block;}
  .desk .nm{text-align:center; font-weight:700; font-size:16px;}
  .desk .rl{text-align:center; color:var(--muted); font-size:12px; margin-top:1px;}
  .badge{display:flex; align-items:center; gap:6px; justify-content:center; margin-top:11px; font-size:12px; font-weight:600; padding:5px 10px; border-radius:999px; background:#0f121b; border:1px solid var(--line); color:var(--muted); width:fit-content; margin:11px auto 0;}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--idle);}
  .desk.active .pulse{background:var(--work); animation:pulse 1.1s infinite;}
  .desk.fixs .pulse{background:var(--fix); animation:pulse 1.1s infinite;}
  .desk.donestate .pulse{background:var(--done);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,157,255,.55)}70%{box-shadow:0 0 0 7px rgba(79,157,255,0)}100%{box-shadow:0 0 0 0 rgba(79,157,255,0)}}
  .task{text-align:center; font-size:12px; color:var(--muted); margin-top:10px; min-height:16px;}
  .zzz{position:absolute; top:12px; right:14px; font-size:13px; opacity:.55;}
  .desk.active .zzz, .desk.fixs .zzz, .desk.donestate .zzz{display:none;}

  .feedwrap{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:16px 18px;}
  .feedhead{font-size:13px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:7px; font-weight:600;}
  .feed{max-height:560px; overflow:auto; display:flex; flex-direction:column; gap:10px;}
  .ln{font-size:14px; display:flex; flex-direction:column; gap:5px; padding:10px 12px; border-radius:10px; background:#12151f; border:1px solid var(--line);}
  .ln.say{border-left:3px solid var(--done);}
  .ln.report-kind{border-left:3px solid #a78bfa;}
  .ln .ms code.ic{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#0f121b;padding:1px 5px;border-radius:4px;color:#c4b5fd;}
  .ln .ms .warn{color:#fbbf24;margin:4px 0;}
  .ln .ms .gate{color:#f472b6;font-weight:600;margin:4px 0;}
  .ln .ms .preblock{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1.45;background:#0a0c12;border:1px solid var(--line);border-radius:8px;padding:10px;margin:6px 0;overflow-x:auto;white-space:pre-wrap;color:#e2e8f0;}
  .ln .ms hr.sep{border:none;border-top:1px solid var(--line);margin:8px 0;}
  .tag.report{color:#c4b5fd;border-color:#7c3aed;}
  .tag.wait{color:#fcd34d;border-color:#d97706;}
  .ln .act-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .ln .ms{color:var(--text); line-height:1.55; white-space:pre-wrap; word-break:break-word; font-size:13.5px;}
  .ln .proj{font-size:10px; font-weight:700; color:#0b0d12; background:var(--work); padding:1px 6px; border-radius:999px;}
  .tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; border:1px solid var(--line); color:var(--muted);}
  .tag.delegate{color:#c4b5fd; border-color:#6d28d9;}
  .tag.skill{color:#6ee7b7; border-color:#059669;}
  .tag.cmd{color:#93c5fd; border-color:#2563eb;}
  .tag.system{color:#fcd34d; border-color:#d97706;}
  .tag.state{color:#fdba74; border-color:#ea580c;}
  .tag.say,.tag.report,.tag.test{color:#6ee7b7; border-color:#059669;}
  .tag.file{color:#f9a8d4; border-color:#db2777;}
  .tag.create{color:#6ee7b7; border-color:#059669;}
  .tag.edit{color:#93c5fd; border-color:#2563eb;}
  .tag.delete{color:#fca5a5; border-color:#dc2626;}
  .tag.rename{color:#fcd34d; border-color:#d97706;}
  .ln.file-kind{border-left:3px solid #f472b6;}
  .ln .file-path{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#c4b5fd;word-break:break-all;}
  .ln .file-detail{font-size:12px;color:var(--muted);margin-top:2px;}
  .ln .file-lines{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#6ee7b7;}
  .desk .curfile{text-align:center;font-size:11px;color:#c4b5fd;margin-top:4px;min-height:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all;}
  .ln .row1{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .ln .t{color:var(--dim); font-variant-numeric:tabular-nums; font-size:11px;}
  .ln .who{font-weight:700;}
  .ln .meta{font-size:12px; color:var(--muted); line-height:1.4;}
  .empty{color:var(--dim); font-size:13px;}
  @media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="title"><span class="logo">🏢</span> AI Agent Software Team <span style="font-size:12px;font-weight:600;color:var(--done);border:1px solid var(--done);padding:2px 8px;border-radius:999px;">LIVE</span></div>
      <div class="sub" id="task">— กำลังเชื่อมต่อ status.json —</div>
    </div>
    <div class="conn" id="conn"><span class="dot"></span><span id="conn-txt">connecting…</span></div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="k"><span class="dotk" style="background:var(--work)"></span>กำลังทำงาน</div><div class="v" id="m-work">0</div></div>
    <div class="metric"><div class="k"><span class="dotk" style="background:var(--idle)"></span>ว่าง</div><div class="v" id="m-idle">6</div></div>
    <div class="metric"><div class="k"><span class="dotk" style="background:var(--done)"></span>เสร็จแล้ว</div><div class="v" id="m-done">0</div></div>
    <div class="metric"><div class="k"><span class="dotk" style="background:var(--fix)"></span>รอบ loop</div><div class="v" id="m-loop">1</div></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="feedwrap">
    <div class="feedhead">⚡ Activity feed <span style="font-weight:500;color:var(--dim)">· file · delegate · skill · cmd</span></div>
    <div class="feed" id="feed"><div class="empty">ยังไม่มีกิจกรรม — รัน agent แล้วให้ loop-orch เรียก dash.sh delegate/skill/cmd</div></div>
  </div>
</div>

<script>
const team = [
  {id:'orch', name:'Orchestrator', role:'Loop lead'},
  {id:'pm',   name:'PM',        role:'Product Manager'},
  {id:'design',name:'Designer', role:'UX / UI'},
  {id:'be',   name:'Backend',   role:'Engineer'},
  {id:'besr', name:'Backend Sr.', role:'DB / Security'},
  {id:'fe',   name:'Frontend',  role:'Engineer'},
  {id:'feanim',name:'Frontend Anim', role:'Animation / 3D'},
  {id:'qa',   name:'QA',        role:'Engineer'},
];

function avatar(id){
  const A = {
    orch:{skin:'#f2c69b',hair:'#3a2f2a',shirt:'#7c5cff'},
    pm:{skin:'#f6d2b8',hair:'#23354f',shirt:'#ec5d8a'},
    design:{skin:'#f2c69b',hair:'#8a2f63',shirt:'#f2a93b'},
    be:{skin:'#e8b08a',hair:'#2b2b2b',shirt:'#17a06f'},
    besr:{skin:'#e0a878',hair:'#3a3a3a',shirt:'#0f7a57'},
    fe:{skin:'#f6d2b8',hair:'#caa24a',shirt:'#3f8ce0'},
    feanim:{skin:'#f2c69b',hair:'#5b3fb0',shirt:'#9c6bff'},
    qa:{skin:'#e8b08a',hair:'#4a2f1f',shirt:'#e24b4a'},
  }[id];
  const head = `
    <ellipse cx="50" cy="92" rx="30" ry="14" fill="rgba(0,0,0,.18)"/>
    <path d="M26 86c0-14 11-22 24-22s24 8 24 22z" fill="${A.shirt}"/>
    <rect x="44" y="52" width="12" height="14" fill="${A.skin}"/>
    <circle cx="50" cy="42" r="17" fill="${A.skin}"/>`;
  const eyes = `<circle cx="44" cy="42" r="2.1" fill="#27313f"/><circle cx="56" cy="42" r="2.1" fill="#27313f"/>
    <path d="M45 49 q5 4 10 0" stroke="#b06a4a" stroke-width="1.6" fill="none" stroke-linecap="round"/>`;
  let extra = '';
  if(id==='orch'){
    extra = `<path d="M33 38a17 17 0 0 1 34 0v3h-4v-3a13 13 0 0 0-26 0v3h-4z" fill="${A.hair}"/>
      <rect x="29.5" y="40" width="4" height="6" rx="2" fill="#cfd6e6"/>
      <path d="M33 46c-2 4-2 7 6 8" stroke="#cfd6e6" stroke-width="2" fill="none"/><circle cx="39" cy="54" r="2.4" fill="#cfd6e6"/>`;
  } else if(id==='pm'){
    extra = `<path d="M33 40a17 16 0 0 1 34 0c0-1-3-16-17-16S33 39 33 40z" fill="${A.hair}"/>
      <rect x="60" y="66" width="16" height="20" rx="2" fill="#eef1f7"/><rect x="65" y="63" width="6" height="4" rx="1.5" fill="#9aa3b8"/>
      <rect x="63" y="71" width="10" height="1.8" fill="#9aa3b8"/><rect x="63" y="75" width="10" height="1.8" fill="#9aa3b8"/><rect x="63" y="79" width="7" height="1.8" fill="#9aa3b8"/>`;
  } else if(id==='design'){
    extra = `<path d="M34 36c2-10 9-15 16-15s14 5 16 15c-6-3-10-4-16-4s-10 1-16 4z" fill="${A.hair}"/>
      <ellipse cx="36" cy="30" rx="16" ry="8" fill="#8a2f63"/><circle cx="50" cy="24" r="2.4" fill="#f2a93b"/>
      <path d="M64 72a9 7 0 1 0 9 7 3 2.5 0 0 1-3-3 6 6 0 0 0-6-4z" fill="#cfd6e6"/><circle cx="62" cy="76" r="1.5" fill="#e24b4a"/><circle cx="67" cy="74" r="1.5" fill="#3f8ce0"/><circle cx="69" cy="79" r="1.5" fill="#17a06f"/>`;
  } else if(id==='be'){
    extra = `<path d="M33 41a17 15 0 0 1 34 0c0-2-2-17-17-17S33 39 33 41z" fill="${A.hair}"/>
      <rect x="39" y="38" width="9" height="7" rx="2" fill="none" stroke="#27313f" stroke-width="1.4"/><rect x="52" y="38" width="9" height="7" rx="2" fill="none" stroke="#27313f" stroke-width="1.4"/><path d="M48 41h4" stroke="#27313f" stroke-width="1.4"/>
      <rect x="60" y="64" width="15" height="22" rx="2" fill="#0f121b" stroke="#46506a"/>
      <rect x="63" y="68" width="9" height="2" fill="#34d399"/><rect x="63" y="73" width="9" height="2" fill="#4f9dff"/><rect x="63" y="78" width="6" height="2" fill="#fbbf24"/>`;
  } else if(id==='fe'){
    extra = `<path d="M32 42c0-13 8-20 18-20s18 7 18 20c-3-6-6-9-9-7-2-5-7-6-9-3-3-3-7-1-9 3-3-2-6 1-9 7z" fill="${A.hair}"/>
      <rect x="59" y="72" width="17" height="11" rx="1.5" fill="#cfd6e6"/><rect x="61" y="74" width="13" height="7" fill="#3f8ce0"/><path d="M58 83h19l-2 2H60z" fill="#9aa3b8"/>`;
  } else if(id==='qa'){
    extra = `<path d="M33 41a17 15 0 0 1 34 0z" fill="${A.hair}"/><path d="M30 33h40v4H30z" fill="#e24b4a"/><path d="M33 33c0-9 7-13 17-13s17 4 17 13z" fill="#e24b4a"/><path d="M67 35h10v3H67z" fill="#e24b4a"/>
      <circle cx="64" cy="72" r="7" fill="none" stroke="#cfd6e6" stroke-width="2.4"/><path d="M69 77l6 6" stroke="#cfd6e6" stroke-width="3" stroke-linecap="round"/>`;
  } else if(id==='besr'){
    extra = `<path d="M33 41a17 15 0 0 1 34 0c0-2-2-17-17-17S33 39 33 41z" fill="${A.hair}"/>
      <path d="M40 49q10 9 20 0c0 6-4 11-10 11s-10-5-10-11z" fill="${A.hair}"/>
      <rect x="40" y="38" width="9" height="6" rx="2" fill="none" stroke="#27313f" stroke-width="1.3"/><rect x="51" y="38" width="9" height="6" rx="2" fill="none" stroke="#27313f" stroke-width="1.3"/>
      <path d="M64 64l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8v-5z" fill="#0f7a57" stroke="#34d399" stroke-width="1.3"/><path d="M61 72l2 2 4-4" stroke="#eef1f7" stroke-width="1.6" fill="none" stroke-linecap="round"/>`;
  } else if(id==='feanim'){
    extra = `<path d="M32 42c0-13 8-20 18-20s18 7 18 20c-3-6-6-9-9-7-2-5-7-6-9-3-3-3-7-1-9 3-3-2-6 1-9 7z" fill="${A.hair}"/>
      <path d="M64 66l8 4v9l-8 4-8-4v-9z" fill="none" stroke="#c9b3ff" stroke-width="1.6" stroke-linejoin="round"/><path d="M64 66v8M64 74l8-4M64 74l-8-4" stroke="#c9b3ff" stroke-width="1.3"/>
      <path d="M50 19l1.4 3.2L55 23l-2.4 2 .8 3.4L50 26.8 46.6 28.4l.8-3.4L45 23l3.6-.8z" fill="#9c6bff"/>`;
  }
  return `<svg class="avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${head}${eyes}${extra}</svg>`;
}

const grid = document.getElementById('grid'), cards={};
team.forEach(m=>{
  const d=document.createElement('div'); d.className='desk';
  d.innerHTML = `<span class="zzz">💤</span>${avatar(m.id)}
    <div class="nm">${m.name}</div><div class="rl">${m.role}</div>
    <div class="badge"><span class="pulse"></span><span data-st>ว่าง</span></div>
    <div class="task" data-task>— รออยู่ที่โต๊ะ —</div>
    <div class="curfile" data-file></div>`;
  grid.appendChild(d);
  cards[m.id]={el:d, st:d.querySelector('[data-st]'), task:d.querySelector('[data-task]'), file:d.querySelector('[data-file]')};
});

const COL={work:'var(--work)',done:'var(--done)',fix:'var(--fix)',idle:'var(--idle)'};
const LABEL={work:'กำลังทำงาน',done:'เสร็จ',fix:'แก้บั๊ก',idle:'ว่าง'};
const $ = id => document.getElementById(id);

const NAME = Object.fromEntries(team.map(m => [m.id, m.name]));
const TO_NAME = id => NAME[id] || id;

function formatMsg(text){
  const raw = String(text || '');
  if (/[│┌├└┼─┬┴]/.test(raw)) {
    return '<pre class="preblock">' + escapeHtml(raw) + '</pre>';
  }
  let s = escapeHtml(raw);
  s = s.replace(/`([^`\n]+)`/g, '<code class="ic">$1</code>');
  s = s.replace(/^⚠️ (.+)$/gm, '<div class="warn">⚠️ $1</div>');
  s = s.replace(/^▎ (.+)$/gm, '<div class="gate">▎ $1</div>');
  s = s.replace(/^---$/gm, '<hr class="sep">');
  return s.replace(/\n/g, '<br>');
}

const FILE_VERB = { create: 'สร้าง', edit: 'แก้', delete: 'ลบ', rename: 'ย้าย' };

function renderLogLine(l){
  const name = NAME[l.who] || l.who;
  const tags = [];
  if (l.kind) tags.push(`<span class="tag ${escapeHtml(l.kind)}">${escapeHtml(l.kind)}</span>`);
  if (l.action) tags.push(`<span class="tag ${escapeHtml(l.action)}">${escapeHtml(FILE_VERB[l.action] || l.action)}</span>`);
  if (l.to) tags.push(`<span class="tag delegate">→ ${escapeHtml(TO_NAME(l.to))}</span>`);
  if (l.skill) tags.push(`<span class="tag skill">${escapeHtml(l.skill)}</span>`);
  const meta = [];
  if (l.cmd) meta.push('cmd: ' + escapeHtml(l.cmd));
  if (l.activity && l.activity !== l.title && l.kind !== 'file') meta.push(escapeHtml(l.activity));
  const proj = l.project ? `<span class="proj">${escapeHtml(l.project)}</span>` : '';
  const sayCls = (l.kind === 'say' || l.kind === 'report' || l.kind === 'test') ? ' say' : '';
  const reportCls = l.kind === 'report' ? ' report-kind' : '';
  const fileCls = l.kind === 'file' ? ' file-kind' : '';
  const title = l.title ? `<div class="act-title">${escapeHtml(l.title)}</div>` : '';
  let body = '';
  if (l.kind === 'file' && l.file) {
    body = `<div class="file-path">${escapeHtml(l.file)}</div>`;
    if (l.detail) body += `<div class="file-detail">${formatMsg(l.detail)}</div>`;
    if (l.lines) body += `<div class="file-lines">${escapeHtml(l.lines)}</div>`;
  } else {
    body = `<div class="ms">${formatMsg(l.msg)}</div>`;
  }
  return `<div class="ln${sayCls}${reportCls}${fileCls}">
    <div class="row1"><span class="t">${l.t||''}</span>${proj}<span class="who">${escapeHtml(name)}</span>${tags.join(' ')}</div>
    ${title}${body}
    ${meta.length ? `<div class="meta">${meta.join(' · ')}</div>` : ''}
  </div>`;
}

function render(s){
  const proj = s.project ? '📁 ' + s.project + ' · ' : '';
  $('task').textContent = s.task ? proj + 'งานปัจจุบัน · ' + s.task : (proj || '— ยังไม่ได้ตั้งงาน —');
  let w=0,d=0,i=0;
  team.forEach(m=>{
    const a = (s.agents && s.agents[m.id]) || {state:'idle',task:''};
    const st = COL[a.state] ? a.state : 'idle';
    const c = cards[m.id];
    c.el.classList.toggle('active', st==='work');
    c.el.classList.toggle('fixs', st==='fix');
    c.el.classList.toggle('donestate', st==='done');
    c.st.textContent = LABEL[st]; c.st.style.color = COL[st];
    c.task.textContent = a.task || (st==='idle' ? '— รออยู่ที่โต๊ะ —' : '');
    c.task.style.color = st==='idle' ? 'var(--muted)' : 'var(--text)';
    if (c.file) c.file.textContent = (st==='work'||st==='fix') && a.file ? a.file : '';
    if(st==='work'||st==='fix') w++; else if(st==='done') d++; else i++;
  });
  $('m-work').textContent=w; $('m-idle').textContent=i; $('m-done').textContent=d; $('m-loop').textContent=s.loop||1;

  const feed = $('feed');
  if(s.log && s.log.length){
    feed.innerHTML = s.log.slice(-250).reverse().map(renderLogLine).join('');
    feed.scrollTop = 0;
  } else {
    feed.innerHTML = '<div class="empty">ยังไม่มีกิจกรรม — รัน agent แล้วให้ loop-orch เรียก dash.sh delegate/skill/cmd</div>';
  }
}
function escapeHtml(x){return String(x).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function setConn(cls,txt){const el=$('conn');el.className='conn '+cls;$('conn-txt').textContent=txt;}

async function poll(){
  try{
    const r = await fetch('./status.json?t='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('http '+r.status);
    const s = await r.json();
    render(s);
    const age = Date.now() - new Date(s.updatedAt||0).getTime();
    if(isFinite(age) && age < 8000) setConn('live','live · อัปเดตล่าสุด '+Math.round(age/1000)+'s');
    else setConn('stale','idle · ไม่มีการอัปเดต '+(isFinite(age)?Math.round(age/1000)+'s':'')+'');
  }catch(e){
    setConn('down','ยังไม่พบ status.json — รัน agent-status.js หรือเปิดผ่าน server');
  }
}
poll();
setInterval(poll, 1500);
</script>
</body>
</html>
